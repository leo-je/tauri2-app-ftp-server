name: dev
on:
  push:
    branches:
      - dev
  # schedule:
  #   - cron: '0 12 * * *'
  pull_request:
    branches:
      - dev
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:


jobs:
  get_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      windows_version: ${{ steps.get_version.outputs.WINDOWSVERSION }}
      current_datetime: ${{ steps.get_version.outputs.CURRENT_DATETIME }}
      macos_version: ${{ steps.get_version.outputs.MACOSVERSION }}
      linux_version: ${{ steps.get_version.outputs.LINUXVERSION }}
      last_commit_msg: ${{ steps.get_version.outputs.LAST_COMMIT_INFO }}
      tagName: ${{ steps.get_version.outputs.TAG }}
      releaseBody: ${{ steps.get_version.outputs.RELEASE_BODY }}
      releaseName: ${{ steps.get_version.outputs.RELEASE_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 创建tab和release信息
        id: get_version
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          # VERSION=$(jq -r '.version' package.json)
          VERSION="0.0"
          run_number="${{github.run_number}}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "WINDOWSVERSION=$VERSION.$run_number" >> $GITHUB_OUTPUT
          echo "MACOSVERSION=$VERSION.$run_number" >> $GITHUB_OUTPUT
          echo "LINUXVERSION=$VERSION.$run_number" >> $GITHUB_OUTPUT
          CURRENT_DATETIME=$(date +"%Y%m%d %H:%M:%S")
          echo "CURRENT_DATETIME=$CURRENT_DATETIME" >> $GITHUB_OUTPUT
          LAST_COMMIT_INFO=$(git log -1 --pretty=format:'%an: %s ')
          echo "$LAST_COMMIT_INFO"
          echo "LAST_COMMIT_INFO=$LAST_COMMIT_INFO" >> $GITHUB_OUTPUT
          TAG="${{github.event_name == 'schedule' && 'schedule-'||''}}$BRANCH_NAME-v$VERSION.$run_number"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Tag:$TAG"
          RELEASEBODY="develop version v$VERSION by ${{github.event_name}}:$LAST_COMMIT_INFO,build number $run_number,time: $CURRENT_DATETIME"
          echo "RELEASEBODY: $RELEASEBODY"
          RELEASENAME="[$BRANCH_NAME]App develop version ${{github.event_name}} v$VERSION.$run_number"
          echo "RELEASENAME: $RELEASENAME"
          gh release create "$TAG" --target "$BRANCH_NAME" --title "$RELEASENAME" --notes "$RELEASEBODY"
          echo "RELEASE_NAME=$RELEASENAME" >> $GITHUB_OUTPUT
          echo "RELEASE_BODY=$RELEASEBODY" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-tauri:
    needs: get_version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            platform_name: 'macos-arm64'
          - platform: 'macos-latest' # for Intel based macs.
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
            platform_name: 'macos-x86_64'
          - platform: 'ubuntu-22.04'
            args: ''
            platform_name: 'linux-x86_64'
          - platform: 'windows-latest'
            args: ''
            platform_name: 'windows-x86_64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: install frontend dependencies
        run: yarn install # change this to npm, pnpm or bun depending on which one you use.

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }} --config '{"version":"${{matrix.platform == 'windows-latest' && needs.get_version.outputs.windows_version || matrix.platform == 'ubuntu-22.04' && needs.get_version.outputs.linux_version || needs.get_version.outputs.macos_version}}"}'

      - name: Rename build artifacts
        shell: bash
        run: |
          VERSION="${{needs.get_version.outputs.version}}"
          RUN_NUMBER="${{github.run_number}}"
          PLATFORM="${{matrix.platform_name}}"
          PRODUCT_NAME="ftp-server"
          BUNDLE_NAME="${PRODUCT_NAME}-${VERSION}.${RUN_NUMBER}-${PLATFORM}"

          # Determine build dir based on whether target is specified
          if [[ -n "${{matrix.target}}" ]]; then
            BUILD_DIR="src-tauri/target/${{matrix.target}}/release/bundle"
          else
            BUILD_DIR="src-tauri/target/release/bundle"
          fi

          echo "Renaming artifacts for ${PLATFORM} in ${BUILD_DIR}..."

          if [[ "${{matrix.platform}}" == "macos-latest" ]]; then
            # Rename .dmg files
            for dmg in ${BUILD_DIR}/dmg/*.dmg; do
              [ -f "$dmg" ] && mv "$dmg" "$(dirname "$dmg")/${BUNDLE_NAME}.dmg"
            done
            # Rename .app.tar.gz files (Tauri v2 places them in macos/ subdirectory)
            for tarball in ${BUILD_DIR}/macos/*.app.tar.gz; do
              [ -f "$tarball" ] && mv "$tarball" "$(dirname "$tarball")/${BUNDLE_NAME}.app.tar.gz"
            done
            # Also check bundle root for .app.tar.gz
            for tarball in ${BUILD_DIR}/*.app.tar.gz; do
              [ -f "$tarball" ] && mv "$tarball" "$(dirname "$tarball")/${BUNDLE_NAME}.app.tar.gz"
            done
            # Rename .app.tar.gz.sig files
            for sig in ${BUILD_DIR}/macos/*.app.tar.gz.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.app.tar.gz.sig"
            done
            for sig in ${BUILD_DIR}/*.app.tar.gz.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.app.tar.gz.sig"
            done
          elif [[ "${{matrix.platform}}" == "windows-latest" ]]; then
            # Rename .msi files
            for msi in ${BUILD_DIR}/msi/*.msi; do
              [ -f "$msi" ] && mv "$msi" "$(dirname "$msi")/${BUNDLE_NAME}.msi"
            done
            # Rename .msi.sig files
            for sig in ${BUILD_DIR}/msi/*.msi.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.msi.sig"
            done
            # Rename .exe (NSIS) files
            for exe in ${BUILD_DIR}/nsis/*.exe; do
              [ -f "$exe" ] && mv "$exe" "$(dirname "$exe")/${BUNDLE_NAME}-setup.exe"
            done
            # Rename .exe.sig files
            for sig in ${BUILD_DIR}/nsis/*.exe.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}-setup.exe.sig"
            done
          elif [[ "${{matrix.platform}}" == "ubuntu-22.04" ]]; then
            # Rename .AppImage files
            for appimage in ${BUILD_DIR}/appimage/*.AppImage; do
              [ -f "$appimage" ] && mv "$appimage" "$(dirname "$appimage")/${BUNDLE_NAME}.AppImage"
            done
            # Rename .AppImage.sig files
            for sig in ${BUILD_DIR}/appimage/*.AppImage.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.AppImage.sig"
            done
            # Rename .deb files
            for deb in ${BUILD_DIR}/deb/*.deb; do
              [ -f "$deb" ] && mv "$deb" "$(dirname "$deb")/${BUNDLE_NAME}.deb"
            done
            # Rename .deb.sig files
            for sig in ${BUILD_DIR}/deb/*.deb.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.deb.sig"
            done
            # Rename .rpm files
            for rpm in ${BUILD_DIR}/rpm/*.rpm; do
              [ -f "$rpm" ] && mv "$rpm" "$(dirname "$rpm")/${BUNDLE_NAME}.rpm"
            done
            # Rename .rpm.sig files
            for sig in ${BUILD_DIR}/rpm/*.rpm.sig; do
              [ -f "$sig" ] && mv "$sig" "$(dirname "$sig")/${BUNDLE_NAME}.rpm.sig"
            done
          fi

          echo "Listing renamed artifacts:"
          find ${BUILD_DIR} -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sig" \) -ls

      - name: Upload renamed artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{needs.get_version.outputs.tagName}}"

          # Determine build dir based on whether target is specified
          if [[ -n "${{matrix.target}}" ]]; then
            BUILD_DIR="src-tauri/target/${{matrix.target}}/release/bundle"
          else
            BUILD_DIR="src-tauri/target/release/bundle"
          fi

          echo "Uploading artifacts for tag ${TAG} from ${BUILD_DIR}..."

          # Upload all renamed bundle files
          find ${BUILD_DIR} -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sig" \) | while read -r file; do
            echo "Uploading: $(basename "$file")"
            gh release upload "$TAG" "$file" --clobber
          done

